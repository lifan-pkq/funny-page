<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 大佬降临 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff006e 0%, #8338ec 50%, #3a86ff 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            position: relative;
            animation: bgFlash 2s infinite;
        }
        
        /* 背景闪电效果 */
        @keyframes bgFlash {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
            75% { filter: brightness(0.8); }
        }
        
        /* 闪电覆盖层 */
        .lightning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0);
            pointer-events: none;
            z-index: 5;
            animation: lightning 3s infinite;
        }
        
        @keyframes lightning {
            0%, 90%, 100% { background: rgba(255,255,255,0); }
            92% { background: rgba(255,255,255,0.8); }
            94% { background: rgba(255,255,255,0); }
            96% { background: rgba(255,255,255,0.5); }
        }
        
        /* 漂浮的背景粒子 */
        .particle {
            position: absolute;
            width: 15px;
            height: 15px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: float 4s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(50vh) rotate(360deg) scale(1.5); }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg) scale(0.5); opacity: 0; }
        }
        
        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }
        
        /* 鬼畜抖动标题 */
        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0 #ff006e, 8px 8px 0 #8338ec, 12px 12px 0 #3a86ff;
            animation: crazyShake 0.5s infinite, rainbowText 1s infinite;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 400%;
        }
        
        @keyframes crazyShake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-3px, 3px) rotate(-2deg); }
            50% { transform: translate(3px, -3px) rotate(2deg); }
            75% { transform: translate(-3px, -3px) rotate(-1deg); }
            100% { transform: translate(3px, 3px) rotate(1deg); }
        }
        
        @keyframes rainbowText {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }
        
        .subtitle {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        /* 照片框 - 鬼畜版 */
        .photo-frame {
            position: relative;
            display: inline-block;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.1s;
            animation: crazyBorder 0.5s infinite, glow 1s infinite alternate;
        }
        
        @keyframes crazyBorder {
            0% { border: 5px solid #ff0000; }
            20% { border: 5px solid #ff7300; }
            40% { border: 5px solid #fffb00; }
            60% { border: 5px solid #48ff00; }
            80% { border: 5px solid #00ffd5; }
            100% { border: 5px solid #7a00ff; }
        }
        
        @keyframes glow {
            from { box-shadow: 0 0 20px #ff006e, 0 0 40px #8338ec, 0 0 60px #3a86ff; }
            to { box-shadow: 0 0 40px #ff006e, 0 0 80px #8338ec, 0 0 120px #3a86ff; }
        }
        
        .photo-frame:hover {
            transform: scale(1.1) rotate(5deg);
            filter: hue-rotate(90deg) saturate(2) contrast(1.2);
        }
        
        .photo-frame.crazy {
            animation: crazyShake 0.1s infinite, crazyBorder 0.2s infinite, glow 0.5s infinite alternate;
        }
        
        .photo-frame img {
            max-width: 400px;
            width: 90vw;
            height: auto;
            display: block;
            filter: contrast(1.1) saturate(1.2);
        }
        
        /* 彩虹边框效果 - 加速版 */
        .photo-frame::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            z-index: -1;
            border-radius: 30px;
            animation: rainbow 0.5s linear infinite;
        }
        
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 表情雨 - 更大更疯狂 */
        .emoji-rain {
            position: fixed;
            font-size: 3rem;
            pointer-events: none;
            animation: fall linear;
            z-index: 100;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }
        
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg) scale(0.5); }
        }
        
        /* 爆炸粒子 */
        .explosion {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
        }
        
        .btn {
            margin-top: 30px;
            padding: 20px 50px;
            font-size: 1.5rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff006e 0%, #8338ec 50%, #3a86ff 100%);
            color: white;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.8);
            animation: btnPulse 0.5s infinite;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        @keyframes btnPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 0, 110, 0.8); }
            50% { transform: scale(1.1); box-shadow: 0 0 60px rgba(255, 0, 110, 1); }
        }
        
        .btn:hover {
            transform: scale(1.2);
            box-shadow: 0 0 80px rgba(255, 0, 110, 1);
        }
        
        .stats {
            margin-top: 20px;
            color: #fff;
            font-size: 1.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .counter {
            font-size: 3rem;
            color: #fffb00;
            font-weight: bold;
            text-shadow: 0 0 20px #fffb00, 0 0 40px #ff7300;
            animation: counterGlow 0.5s infinite alternate;
        }
        
        @keyframes counterGlow {
            from { text-shadow: 0 0 20px #fffb00, 0 0 40px #ff7300; }
            to { text-shadow: 0 0 40px #fffb00, 0 0 80px #ff7300, 0 0 120px #ff006e; }
        }
        
        /* 点击特效 */
        .click-effect {
            position: absolute;
            pointer-events: none;
            animation: clickPop 0.3s ease-out forwards;
            font-size: 4rem;
        }
        
        @keyframes clickPop {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(180deg); }
            100% { transform: scale(2) rotate(360deg); opacity: 0; }
        }
        
        footer {
            margin-top: 40px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            animation: fadeInOut 2s infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 闪电效果 -->
    <div class="lightning"></div>
    
    <!-- 背景粒子 -->
    <div id="particles"></div>
    
    <div class="container">
        <h1>🔥 大佬降临 🔥</h1>
        <p class="subtitle">⚡ 疯狂点击，释放能量！⚡</p>
        
        <div class="photo-frame" id="photoFrame">
            <img src="hero.jpg" alt="大佬">
        </div>
        
        <button class="btn" id="praiseBtn">💥 膜拜大佬 💥</button>
        
        <div class="stats">
            <p>🔥 已被膜拜 <span class="counter" id="counter">0</span> 次 🔥</p>
        </div>
    </div>
    
    <footer>
        <p>⚡ Made with 🔥 for Maximum Fun ⚡</p>
    </footer>
    
    <script>
        let count = 0;
        const counter = document.getElementById('counter');
        const photoFrame = document.getElementById('photoFrame');
        const praiseBtn = document.getElementById('praiseBtn');
        const emojis = ['👍', '🔥', '💯', '👏', '🙌', '⭐', '💪', '🎉', '👑', '😎', '⚡', '💥', '🚀', '✨', '🌟'];
        const colors = ['#ff0000', '#ff7300', '#fffb00', '#48ff00', '#00ffd5', '#002bff', '#7a00ff', '#ff00c8'];
        
        // 创建背景粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 4 + 's';
                particle.style.animationDuration = (2 + Math.random() * 3) + 's';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(particle);
            }
        }
        createParticles();
        
        // 爆炸特效
        function createExplosion(x, y) {
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'explosion';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.boxShadow = `0 0 10px ${particle.style.background}`;
                
                const angle = (Math.PI * 2 * i) / 20;
                const velocity = 100 + Math.random() * 200;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                document.body.appendChild(particle);
                
                let posX = x;
                let posY = y;
                let opacity = 1;
                
                const animate = () => {
                    posX += vx * 0.1;
                    posY += vy * 0.1;
                    opacity -= 0.02;
                    
                    particle.style.left = posX + 'px';
                    particle.style.top = posY + 'px';
                    particle.style.opacity = opacity;
                    
                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                };
                requestAnimationFrame(animate);
            }
        }
        
        // 点赞功能
        function praise(x, y) {
            count++;
            counter.textContent = count;
            
            // 触发疯狂抖动
            photoFrame.classList.add('crazy');
            setTimeout(() => photoFrame.classList.remove('crazy'), 500);
            
            // 创建爆炸特效
            if (x && y) {
                createExplosion(x, y);
            }
            
            // 创建表情雨（更多更疯狂）
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    createEmoji(x || window.innerWidth/2, y || window.innerHeight/2);
                }, i * 50);
            }
            
            // 背景闪烁
            document.body.style.animation = 'none';
            setTimeout(() => {
                document.body.style.animation = 'bgFlash 0.2s infinite';
            }, 10);
            setTimeout(() => {
                document.body.style.animation = 'bgFlash 2s infinite';
            }, 1000);
        }
        
        // 创建飘落表情
        function createEmoji(x, y) {
            const emoji = document.createElement('div');
            emoji.className = 'emoji-rain';
            emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = (x + (Math.random() - 0.5) * 400) + 'px';
            emoji.style.top = y + 'px';
            emoji.style.animationDuration = (0.5 + Math.random() * 1.5) + 's';
            emoji.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(emoji);
            
            setTimeout(() => emoji.remove(), 2000);
        }
        
        // 点击照片
        photoFrame.addEventListener('click', (e) => {
            const rect = photoFrame.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            
            praise(centerX, centerY);
            
            // 点击特效
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.textContent = ['💥', '⚡', '🔥', '✨'][Math.floor(Math.random() * 4)];
            effect.style.left = e.pageX + 'px';
            effect.style.top = e.pageY + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 300);
        });
        
        // 点击按钮
        praiseBtn.addEventListener('click', () => {
            const rect = photoFrame.getBoundingClientRect();
            praise(rect.left + rect.width/2, rect.top + rect.height/2);
        });
        
        // 自动递增（更频繁）
        setInterval(() => {
            if (Math.random() > 0.5) {
                count++;
                counter.textContent = count;
                if (Math.random() > 0.7) {
                    createEmoji(window.innerWidth/2, window.innerHeight/2);
                }
            }
        }, 2000);
        
        // 读取本地存储的计数
        const saved = localStorage.getItem('praiseCount');
        if (saved) {
            count = parseInt(saved);
            counter.textContent = count;
        }
        
        // 保存计数
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('praiseCount', count);
        });
        
        // 随机触发闪电效果
        setInterval(() => {
            if (Math.random() > 0.8) {
                document.body.style.filter = 'brightness(2)';
                setTimeout(() => {
                    document.body.style.filter = 'brightness(1)';
                }, 100);
            }
        }, 5000);
    </script>
</body>
</html>
